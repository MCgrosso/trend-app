<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#08051a" />
  <title>#TREND — Sin conexión</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #08051a;
      color: #f0f0ff;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      min-height: 100dvh;
    }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .logo { display: flex; font-weight: 900; font-size: 56px; letter-spacing: 0.04em; margin-bottom: 24px; }
    .logo span:nth-child(1) { color: #00d4ff; }
    .logo span:nth-child(2) { color: #f97316; }
    .logo span:nth-child(3) { color: #7c3aed; }
    .logo span:nth-child(4) { color: #10b981; }
    .logo span:nth-child(5) { color: #eab308; }
    .logo span:nth-child(6) { color: #ef4444; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p  { color: #9ca3af; font-size: 14px; max-width: 320px; line-height: 1.5; margin: 0 0 24px; }
    button {
      background: linear-gradient(90deg, #7c3aed, #8b5cf6);
      color: white; border: 0; border-radius: 999px;
      padding: 12px 28px; font-weight: 700; font-size: 14px;
      cursor: pointer;
    }
    button:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="logo">
    <span>#</span><span>T</span><span>R</span><span>E</span><span>N</span><span>D</span>
  </div>
  <h1>Sin conexión</h1>
  <p>No pudimos cargar la app. Revisá tu internet y volvé a intentar.</p>
  <button onclick="location.reload()">Reintentar</button>
</body>
</html>
